# ============================================================
# PCB BGA 逃逸布线智能体 - 配置文件
# 修改本文件后重启程序生效
# ============================================================

[model]
# 大模型 API 密钥
# 建议测试时通过环境变量 OPENAI_API_KEY 注入，避免把密钥写入仓库文件。
api_key  =

# 模型名称
model    = deepseek-chat

# API 接入地址（OpenAI 兼容模式）
base_url = https://api.deepseek.com

# 版图数据传输模式：
#   0（默认）- PCB 客户端直接返回 S 表达式字符串
#   1        - PCB 客户端返回文件路径，Agent 自动读取文件内容
board_data_use_file_path = 0

[pcb]
# 是否启用长上下文版图分析模块进行 BGA 提取
#   true（默认）- 使用内置模块解析版图，精度更高
#   false       - 由大模型直接分析原始版图数据
use_long_context_module = true

[router]
# 北科大规则布线器可执行文件路径
cmd      = router.exe

# 布线器工作目录（输入/输出文件均在此目录下）
work_dir = .

[server]
# WebSocket 监听地址和端口
host = 0.0.0.0
port = 8765
