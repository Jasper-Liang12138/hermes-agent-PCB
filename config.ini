# ============================================================
# PCB BGA 逃逸布线智能体 — 配置文件
# 修改本文件后重启程序生效
# ============================================================

[model]
# 大模型 API 密钥
api_key  = sk-bc0dd07b65a04d138ff8519e7b60e900

# 模型名称（DashScope 示例：qwen-plus / qwen3-32b）
model    = qwen3.5-122b-a10b

# API 接入地址（DashScope OpenAI 兼容模式）
base_url = https://dashscope.aliyuncs.com/compatible-mode/v1

# 版图数据传输模式：
#   0（默认）— PCB 客户端直接返回 S 表达式字符串
#   1        — PCB 客户端返回文件路径，Agent 自动读取文件内容
board_data_use_file_path = 0

[router]
# 北科大规则布线器可执行文件路径
cmd      = router.exe

# 布线器工作目录（输入/输出文件均在此目录下）
work_dir = .

[server]
# WebSocket 监听地址和端口
host = 0.0.0.0
port = 8765
