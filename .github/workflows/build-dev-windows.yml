name: Build Dev Package (Windows)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "默认模型名称"
        default: "qwen3.5-122b-a10b"
        required: false
      ws_port:
        description: "WebSocket 端口"
        default: "8765"
        required: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build agent.exe
        run: |
          pyinstaller `
            --name agent `
            --onedir `
            --noconfirm `
            --add-data "agent;agent" `
            --add-data "hermes_cli;hermes_cli" `
            --add-data "plugins;plugins" `
            --add-data "tools;tools" `
            --add-data "gateway;gateway" `
            --add-data "skills;skills" `
            --add-data "test_client;test_client" `
            --add-data "config.ini;." `
            --hidden-import tiktoken_ext.openai_public `
            --hidden-import tiktoken_ext `
            --hidden-import anthropic `
            --hidden-import openai `
            --hidden-import aiohttp `
            --hidden-import websockets `
            --collect-all firecrawl `
            cli.py

      - name: Build test-client.exe
        run: |
          pip install websockets
          pyinstaller `
            --name test-client `
            --onefile `
            --noconfirm `
            test_client/ws_test_client.py

      - name: Copy test-client.exe
        run: copy dist\test-client.exe dist\agent\test-client.exe

      - name: Write config.ini
        shell: pwsh
        run: |
          $model = "${{ github.event.inputs.model }}"
          $port  = "${{ github.event.inputs.ws_port }}"
          @"
          # ============================================================
          # PCB BGA 逃逸布线智能体 — 配置文件
          # 修改本文件后重启程序生效
          # ============================================================

          [model]
          # 大模型 API 密钥
          api_key  = your_api_key_here

          # 模型名称
          model    = $model

          # API 接入地址（阿里云百炼示例）
          base_url = https://dashscope.aliyuncs.com/compatible-mode/v1

          # 版图数据传输模式：0 = 直接返回字符串，1 = 返回文件路径
          board_data_use_file_path = 0

          [router]
          # 布线器可执行文件路径（相对于本 exe 所在目录）
          cmd      = router.exe
          work_dir = .

          [server]
          # WebSocket 监听地址和端口
          host = 0.0.0.0
          port = $port
          "@ | Out-File -FilePath dist\agent\config.ini -Encoding utf8

      - name: Write start-gateway.bat
        shell: pwsh
        run: |
          $port = "${{ github.event.inputs.ws_port }}"
          @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"

          if not exist "%~dp0config.ini" (
              echo [!] 找不到 config.ini，请确认文件完整
              pause
              exit /b 1
          )

          findstr /C:"your_api_key_here" "%~dp0config.ini" >nul 2>&1
          if not errorlevel 1 (
              echo [!] 请先编辑 config.ini 填入 api_key，然后重新运行。
              notepad "%~dp0config.ini"
              pause
              exit /b 1
          )

          echo [*] 启动 PCB Agent Gateway...
          echo [*] WebSocket 监听: ws://127.0.0.1:$port
          echo [*] 按 Ctrl+C 退出
          echo.
          agent.exe --gateway
          echo.
          echo [!] Gateway 已退出，错误码: %ERRORLEVEL%
          pause
          "@ | Out-File -FilePath dist\agent\start-gateway.bat -Encoding utf8

      - name: Write test-client.bat
        shell: pwsh
        run: |
          $port = "${{ github.event.inputs.ws_port }}"
          @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"

          echo ============================================
          echo  PCB Agent 开发测试客户端
          echo  连接: ws://127.0.0.1:$port
          echo  确保 start-gateway.bat 已在另一个窗口运行
          echo ============================================
          echo.

          test-client.exe --port $port --project-id proj-test
          pause
          "@ | Out-File -FilePath dist\agent\test-client.bat -Encoding utf8

      - name: Copy PCB skill
        shell: pwsh
        run: |
          $skillSrc = "skills\hardware\pcb-intelligence"
          $skillDst = "dist\agent\skills\hardware\pcb-intelligence"
          if (Test-Path $skillSrc) {
            New-Item -ItemType Directory -Force -Path $skillDst | Out-Null
            Copy-Item -Recurse -Force "$skillSrc\*" $skillDst
          }

      - name: Write README.txt
        shell: pwsh
        run: |
          @"
          PCB Agent 开发测试包
          ====================

          使用步骤：
          1. 编辑 config.ini，填入 api_key
          2. 双击 start-gateway.bat  -> 启动 WebSocket 服务（ws://127.0.0.1:${{ github.event.inputs.ws_port }}）
          3. 新开一个窗口，双击 test-client.bat  -> 启动交互式测试客户端

          test-client 操作说明：
          - 收到 tool-calls 时，直接回车使用 mock 数据；输入 skip 跳过；输入 json:{...} 自定义返回值
          - 收到 Agent 回复后，直接输入下一条消息继续对话

          修改配置（config.ini）：
          - api_key   : LLM API 密钥
          - model     : 模型名称
          - base_url  : API 接入地址
          - port      : WebSocket 端口（[server] 段）
          "@ | Out-File -FilePath dist\agent\README.txt -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pcb-agent-dev-win
          path: dist/agent/
          retention-days: 14
