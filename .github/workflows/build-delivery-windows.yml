name: Build Delivery Package (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.0.0）"
        default: "1.0.0"
        required: true
      model:
        description: "默认模型名称"
        default: "qwen3.5-122b-a10b"
        required: false
      ws_port:
        description: "WebSocket 端口"
        default: "8765"
        required: false
      stream:
        description: "是否开启流式传输（true/false）"
        default: "true"
        required: false
      thinking:
        description: "是否开启思考模式（true/false）"
        default: "false"
        required: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build agent.exe
        run: |
          pyinstaller `
            --name agent `
            --onedir `
            --noconsole `
            --noconfirm `
            --add-data "agent;agent" `
            --add-data "hermes_cli;hermes_cli" `
            --add-data "plugins;plugins" `
            --add-data "tools;tools" `
            --add-data "gateway;gateway" `
            --add-data "skills;skills" `
            --add-data "config.ini;." `
            --hidden-import tiktoken_ext.openai_public `
            --hidden-import tiktoken_ext `
            --hidden-import anthropic `
            --hidden-import openai `
            --hidden-import aiohttp `
            --hidden-import websockets `
            --collect-all firecrawl `
            cli.py

      - name: Write config.ini
        shell: pwsh
        run: |
          $model    = "${{ github.event.inputs.model }}"
          $port     = "${{ github.event.inputs.ws_port }}"
          $stream   = "${{ github.event.inputs.stream }}"
          $thinking = "${{ github.event.inputs.thinking }}"
          @"
          # ============================================================
          # PCB BGA 逃逸布线智能体 — 配置文件
          # 修改本文件后重启程序生效
          # ============================================================

          [model]
          # 大模型 API 密钥
          api_key  = your_api_key_here

          # 模型名称
          model    = $model

          # API 接入地址（阿里云百炼示例）
          base_url = https://dashscope.aliyuncs.com/compatible-mode/v1

          # 版图数据传输模式：0 = 直接返回字符串，1 = 返回文件路径
          board_data_use_file_path = 0

          # 是否开启流式传输（true/false）
          stream   = $stream

          # 是否开启思考模式（true/false）
          thinking = $thinking

          [router]
          # 布线器可执行文件路径（相对于本 exe 所在目录）
          cmd      = router.exe
          work_dir = .

          [server]
          # WebSocket 监听地址和端口
          host = 0.0.0.0
          port = $port
          "@ | Out-File -FilePath dist\agent\config.ini -Encoding utf8

      - name: Write install.bat
        shell: pwsh
        run: |
          @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"

          echo ============================================
          echo  PCB Agent 安装程序 v${{ github.event.inputs.version }}
          echo ============================================
          echo.
          echo 请编辑 config.ini 填入 api_key，然后运行 start.bat 启动。
          echo.
          notepad "%~dp0config.ini"
          echo.
          echo 配置完成后，双击 start.bat 启动 Agent。
          pause
          "@ | Out-File -FilePath dist\agent\install.bat -Encoding utf8

      - name: Write start.bat
        shell: pwsh
        run: |
          $port = "${{ github.event.inputs.ws_port }}"
          @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"

          if not exist "%~dp0config.ini" (
              echo [!] 找不到 config.ini，请确认文件完整
              pause
              exit /b 1
          )

          findstr /C:"your_api_key_here" "%~dp0config.ini" >nul 2>&1
          if not errorlevel 1 (
              echo [!] 请先编辑 config.ini 填入 api_key，然后重新运行。
              notepad "%~dp0config.ini"
              pause
              exit /b 1
          )

          echo [*] 启动 PCB Agent Gateway...
          echo [*] WebSocket 监听: ws://127.0.0.1:$port
          echo [*] 按 Ctrl+C 退出
          echo.
          agent.exe --gateway
          echo.
          echo [!] Gateway 已退出，错误码: %ERRORLEVEL%
          pause
          "@ | Out-File -FilePath dist\agent\start.bat -Encoding utf8

      - name: Write uninstall.bat
        shell: pwsh
        run: |
          @"
          @echo off
          chcp 65001 >nul
          echo 此操作将删除 %USERPROFILE%\.hermes\（包含记忆、日志）
          set /p CONFIRM=确认删除？(y/N):
          if /i "%CONFIRM%" neq "y" exit /b 0
          rmdir /S /Q "%USERPROFILE%\.hermes"
          echo 已卸载。
          pause
          "@ | Out-File -FilePath dist\agent\uninstall.bat -Encoding utf8

      - name: Copy PCB skill
        shell: pwsh
        run: |
          $skillSrc = "skills\hardware\pcb-intelligence"
          $skillDst = "dist\agent\skills\hardware\pcb-intelligence"
          if (Test-Path $skillSrc) {
            New-Item -ItemType Directory -Force -Path $skillDst | Out-Null
            Copy-Item -Recurse -Force "$skillSrc\*" $skillDst
          }

      - name: Copy delivery docs
        shell: pwsh
        run: |
          $docsDir = "dist\agent\docs"
          New-Item -ItemType Directory -Force -Path $docsDir | Out-Null
          if (Test-Path ".github\delivery\使用说明.md") {
            Copy-Item ".github\delivery\使用说明.md" $docsDir
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pcb-agent-v${{ github.event.inputs.version }}-windows
          path: dist/agent/
          retention-days: 30
