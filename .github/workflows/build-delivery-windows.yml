name: Build Delivery Package (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.0.0）"
        default: "1.0.0"
        required: true
      model:
        description: "默认模型名称"
        default: "qwen3.5-122b-a10b"
        required: false
      ws_port:
        description: "WebSocket 端口"
        default: "8765"
        required: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ".[all]"

      - name: Build agent.exe
        run: |
          pyinstaller `
            --name agent `
            --onedir `
            --noconfirm `
            --add-data "agent;agent" `
            --add-data "hermes_cli;hermes_cli" `
            --add-data "plugins;plugins" `
            --add-data "tools;tools" `
            --add-data "gateway;gateway" `
            --add-data "skills;skills" `
            --hidden-import tiktoken_ext.openai_public `
            --hidden-import tiktoken_ext `
            --hidden-import anthropic `
            --hidden-import openai `
            --hidden-import aiohttp `
            --hidden-import websockets `
            --collect-all firecrawl `
            cli.py

      - name: Write install.bat
        shell: pwsh
        run: |
          $port = "${{ github.event.inputs.ws_port }}"
          $model = "${{ github.event.inputs.model }}"
          @"
          @echo off
          chcp 65001 >nul
          setlocal
          set HERMES=%USERPROFILE%\.hermes
          set SCRIPT_DIR=%~dp0

          echo ============================================
          echo  PCB Agent 安装程序 v${{ github.event.inputs.version }}
          echo ============================================
          echo.

          mkdir "%HERMES%" 2>nul
          mkdir "%HERMES%\memories" 2>nul
          mkdir "%HERMES%\skills\hardware" 2>nul

          xcopy /E /Y /I "%SCRIPT_DIR%skills" "%HERMES%\skills\" >nul
          echo [OK] PCB skill 已安装

          if not exist "%HERMES%\.env" (
              (
                echo OPENAI_API_KEY=your_api_key_here
                echo OPENAI_BASE_URL=https://your-endpoint/v1
              ) > "%HERMES%\.env"
              echo [!!] 请填写 API Key，正在打开配置文件...
              notepad "%HERMES%\.env"
          ) else (
              echo [OK] .env 已存在，跳过
          )

          if not exist "%HERMES%\config.yaml" (
              (
                echo model:
                echo   provider: "custom"
                echo   default: "$model"
                echo   base_url: ""
                echo streaming:
                echo   enabled: true
                echo gateway:
                echo   websocket:
                echo     enabled: true
                echo     host: "0.0.0.0"
                echo     port: $port
                echo agent:
                echo   reasoning_effort: "medium"
                echo display:
                echo   show_reasoning: false
              ) > "%HERMES%\config.yaml"
              echo [OK] config.yaml 已生成
          ) else (
              echo [OK] config.yaml 已存在，跳过
          )

          echo.
          echo 安装完成！运行 start.bat 启动 Agent。
          pause
          "@ | Out-File -FilePath dist\agent\install.bat -Encoding utf8

      - name: Write start.bat
        shell: pwsh
        run: |
          $port = "${{ github.event.inputs.ws_port }}"
          @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"

          if not exist "%USERPROFILE%\.hermes\.env" (
              echo 未检测到配置，请先运行 install.bat
              pause
              exit /b 1
          )

          set ROUTER_CMD=%~dp0router.exe
          set ROUTER_WORK_DIR=%~dp0

          echo [*] 启动 PCB Agent Gateway...
          echo [*] WebSocket 监听: ws://127.0.0.1:$port
          echo [*] 按 Ctrl+C 退出
          echo.
          agent.exe gateway
          "@ | Out-File -FilePath dist\agent\start.bat -Encoding utf8

      - name: Write uninstall.bat
        shell: pwsh
        run: |
          @"
          @echo off
          chcp 65001 >nul
          echo 此操作将删除 %USERPROFILE%\.hermes\（包含记忆、配置）
          set /p CONFIRM=确认删除？(y/N):
          if /i "%CONFIRM%" neq "y" exit /b 0
          rmdir /S /Q "%USERPROFILE%\.hermes"
          echo 已卸载。
          pause
          "@ | Out-File -FilePath dist\agent\uninstall.bat -Encoding utf8

      - name: Copy PCB skill
        shell: pwsh
        run: |
          $skillSrc = "skills\hardware\pcb-intelligence"
          $skillDst = "dist\agent\skills\hardware\pcb-intelligence"
          if (Test-Path $skillSrc) {
            New-Item -ItemType Directory -Force -Path $skillDst | Out-Null
            Copy-Item -Recurse -Force "$skillSrc\*" $skillDst
          }

      - name: Copy delivery docs
        shell: pwsh
        run: |
          $docsDir = "dist\agent\docs"
          New-Item -ItemType Directory -Force -Path $docsDir | Out-Null
          if (Test-Path ".github\delivery\使用说明.md") {
            Copy-Item ".github\delivery\使用说明.md" $docsDir
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcb-agent-v${{ github.event.inputs.version }}-windows
          path: dist/agent/
          retention-days: 30
